<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spielergebnisse</title>

  <meta property="og:title" content="Spielergebnisse" />
  <meta property="og:description" content="Die Auswertung ist online :)" />
  <meta property="og:url" content="https://www.strikeclub-velten.de/aktuelle_ergebnisse.html" />
  <meta property="og:image" content="https://raw.githubusercontent.com/Chaperon2/Ergebnisse-Liga/refs/heads/main/images/Linkvorschau.png" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --text: #0f172a;
      --text-soft: #5f718d;
      --border: rgba(119, 145, 185, 0.14);
      --shadow-xl: 0 30px 80px rgba(35, 58, 100, 0.14);
      --shadow-lg: 0 18px 46px rgba(35, 58, 100, 0.10);
      --shadow-md: 0 10px 28px rgba(35, 58, 100, 0.08);
      --max-width: 1440px;
      --table-font-size: 12.8px;
      --table-cell-padding-y: 8px;
      --table-cell-padding-x: 7px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(91, 124, 255, 0.12), transparent 30%),
        radial-gradient(circle at 92% 10%, rgba(255, 92, 159, 0.12), transparent 24%),
        radial-gradient(circle at 82% 84%, rgba(51, 198, 255, 0.14), transparent 30%),
        linear-gradient(180deg, #fbfdff 0%, #f3f8ff 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(76px);
      opacity: 0.44;
      animation: drift 18s ease-in-out infinite;
    }

    .glow.one {
      width: 340px;
      height: 340px;
      left: -80px;
      top: 40px;
      background: rgba(91, 124, 255, 0.16);
    }

    .glow.two {
      width: 290px;
      height: 290px;
      right: -30px;
      top: 140px;
      background: rgba(255, 92, 159, 0.14);
      animation-delay: -6s;
    }

    .glow.three {
      width: 380px;
      height: 380px;
      right: 14%;
      bottom: -100px;
      background: rgba(51, 198, 255, 0.16);
      animation-delay: -11s;
    }

    .bg-shape {
      position: absolute;
      opacity: 0.22;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }

    .ball-bg {
      width: var(--size, 120px);
      height: var(--size, 120px);
      left: var(--x, 10%);
      top: var(--y, 10%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 35%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        radial-gradient(circle at 55% 28%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        radial-gradient(circle at 60% 48%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        linear-gradient(145deg, var(--c1, #7c9bff), var(--c2, #b15cff));
      box-shadow:
        inset -18px -18px 30px rgba(255,255,255,0.24),
        inset 18px 18px 28px rgba(255,255,255,0.14),
        0 16px 32px rgba(65, 85, 130, 0.10);
      animation-name: floatBall;
      animation-duration: var(--dur, 18s);
      animation-delay: var(--delay, 0s);
    }

    .pin-bg {
      width: var(--w, 56px);
      height: var(--h, 164px);
      left: var(--x, 15%);
      top: var(--y, 20%);
      border-radius: 40% 40% 42% 42% / 15% 15% 72% 72%;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 40%, #eef4ff 100%);
      box-shadow:
        inset 0 0 0 1px rgba(150, 170, 205, 0.14),
        0 16px 32px rgba(65, 85, 130, 0.08);
      animation-name: swayPin;
      animation-duration: var(--dur, 16s);
      animation-delay: var(--delay, 0s);
      transform-origin: center 82%;
    }

    .pin-bg::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 8px;
      right: 8px;
      height: 18px;
      border-radius: 999px;
      background:
        linear-gradient(180deg,
          rgba(255, 92, 159, 0.84) 0%,
          rgba(255, 92, 159, 0.84) 42%,
          transparent 42%,
          transparent 58%,
          rgba(255, 104, 142, 0.74) 58%,
          rgba(255, 104, 142, 0.74) 100%);
    }

    .site {
      position: relative;
      z-index: 2;
      width: min(var(--max-width), calc(100% - 22px));
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(122, 146, 182, 0.14);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(35, 58, 100, 0.06);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(91,124,255,1), rgba(255,92,159,1));
      color: #fff;
      box-shadow: 0 8px 20px rgba(91, 124, 255, 0.24);
    }

    .back-link {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(122, 146, 182, 0.14);
      color: var(--text-soft);
      font-size: 0.94rem;
      font-weight: 700;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(35, 58, 100, 0.06);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .page {
      position: relative;
      padding: 20px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(255,255,255,0.80));
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 10%, rgba(91, 124, 255, 0.10), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(255, 92, 159, 0.08), transparent 22%),
        radial-gradient(circle at 72% 100%, rgba(51, 198, 255, 0.10), transparent 28%);
      pointer-events: none;
    }

    .header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(122, 146, 182, 0.12);
      font-weight: 700;
      font-size: 0.9rem;
      color: #36507a;
      margin-bottom: 14px;
      box-shadow: 0 10px 24px rgba(35, 58, 100, 0.04);
    }

    .eyebrow .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3bc7ff, #7a5cff);
      box-shadow: 0 0 0 6px rgba(91, 124, 255, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .headline-accent {
      background: linear-gradient(135deg, #0f172a 0%, #4964ff 44%, #ff5c9f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .intro {
      max-width: 72ch;
      color: var(--text-soft);
      line-height: 1.55;
      font-size: 0.96rem;
      margin: 12px 0 0;
    }

    .date-pill {
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(122,146,182,0.14);
      box-shadow: 0 12px 28px rgba(35, 58, 100, 0.06);
      min-width: 220px;
    }

    .date-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: #6a7b97;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 6px;
    }

    .date-value {
      font-size: 1.22rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .results-panel {
      position: relative;
      z-index: 1;
      border-radius: 24px;
      background: rgba(255,255,255,0.60);
      border: 1px solid rgba(122,146,182,0.12);
      box-shadow: var(--shadow-lg);
      padding: 12px;
    }

    .warning-pill {
      display: none;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 184, 77, 0.18);
      border: 1px solid rgba(255, 184, 77, 0.28);
      color: #8a5a00;
      font-size: 0.86rem;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(35, 58, 100, 0.04);
    }

    .warning-pill.show {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .sections-grid {
      display: grid;
      gap: 14px;
    }

    .table-card {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(122,146,182,0.12);
      box-shadow: 0 16px 36px rgba(35, 58, 100, 0.06);
    }

    .table-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 8% 15%, var(--accent-a), transparent 24%),
        radial-gradient(circle at 90% 20%, var(--accent-b), transparent 22%),
        radial-gradient(circle at 78% 88%, var(--accent-c), transparent 26%);
      opacity: 0.78;
    }

    .theme-spieltag {
      --accent-a: rgba(91,124,255,0.22);
      --accent-b: rgba(255,92,159,0.16);
      --accent-c: rgba(51,198,255,0.16);
    }

    .theme-einzel {
      --accent-a: rgba(255,184,77,0.22);
      --accent-b: rgba(255,92,159,0.16);
      --accent-c: rgba(138,92,255,0.16);
    }

    .theme-team {
      --accent-a: rgba(55,201,151,0.22);
      --accent-b: rgba(49,182,255,0.16);
      --accent-c: rgba(91,124,255,0.16);
    }

    .table-head {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(122,146,182,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(248,251,255,0.64));
      backdrop-filter: blur(8px);
    }

    .table-title-wrap {
      display: grid;
      gap: 4px;
    }

    .table-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .table-subtitle {
      color: var(--text-soft);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .stats-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(122,146,182,0.12);
      color: #596f93;
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(35, 58, 100, 0.04);
    }

    .stacked-tables {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      padding: 0 0 2px;
    }

    .subtable-shell {
      border-top: 1px solid rgba(122,146,182,0.08);
    }

    .subtable-shell:first-child {
      border-top: 0;
    }

    .subtable-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 16px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.76), rgba(247,250,255,0.58));
      border-bottom: 1px solid rgba(122,146,182,0.08);
    }

    .subtable-title {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .table-wrap {
      position: relative;
      z-index: 1;
      padding: 0;
    }

    .table-wrap table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-size: var(--table-font-size);
      user-select: text;
      -webkit-user-select: text;
      font-variant-numeric: tabular-nums;
    }

    .table-wrap thead th {
      text-align: center;
      padding: var(--table-cell-padding-y) var(--table-cell-padding-x);
      background: linear-gradient(180deg, rgba(250,252,255,0.98), rgba(242,247,255,0.96));
      color: #4f6489;
      font-size: 0.9em;
      font-weight: 800;
      letter-spacing: 0.01em;
      border-bottom: 1px solid rgba(122,146,182,0.12);
      border-right: 1px solid rgba(122,146,182,0.06);
      vertical-align: middle;
      line-height: 1.15;
      word-break: break-word;
    }

    .table-wrap tbody td {
      padding: var(--table-cell-padding-y) var(--table-cell-padding-x);
      border-bottom: 1px solid rgba(122,146,182,0.08);
      border-right: 1px solid rgba(122,146,182,0.05);
      background: rgba(255,255,255,0.88);
      vertical-align: middle;
      line-height: 1.15;
      word-break: break-word;
      text-align: center;
      transition: filter 0.18s ease, box-shadow 0.18s ease;
    }

    .table-wrap tbody tr:nth-child(even) td {
      background: rgba(246,250,255,0.90);
    }

    .table-wrap tbody tr:hover td {
      filter: brightness(0.985);
    }

    .table-wrap tbody tr.is-selected td {
      box-shadow: inset 0 0 0 1px rgba(91,124,255,0.18), inset 0 0 0 999px rgba(91,124,255,0.05);
    }

    .table-wrap td.text-left,
    .table-wrap th.text-left {
      text-align: left;
    }

    .table-wrap .col-rank { width: 5.5%; font-weight: 800; }
    .table-wrap .col-trend { width: 6%; }
    .table-wrap .col-name { width: 12%; }
    .table-wrap .col-team { width: 14%; }
    .table-wrap .col-short { width: 7%; }
    .table-wrap .col-medium { width: 8%; }
    .table-wrap .col-long { width: 9%; }
    .table-wrap .col-round { width: 10%; }
    .table-wrap .col-result { width: 7%; font-weight: 800; }

    .table-wrap .muted-cell {
      color: #9aa7bc;
    }

    .separator-row td {
      font-size: 0.95em;
      font-weight: 800;
      color: #7587a7;
      background: linear-gradient(180deg, rgba(243,248,255,0.92), rgba(238,245,255,0.92)) !important;
      letter-spacing: 0.08em;
      padding-top: 6px;
      padding-bottom: 6px;
    }

    .blank-separator td {
  padding: 0 !important;
  height: 14px;
  border-bottom: 0 !important;
  background: linear-gradient(90deg, rgba(91,124,255,0.86), rgba(255,92,159,0.82), rgba(51,198,255,0.84)) !important;
}

    .tendency {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.9em;
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.28);
    }

    .tendency.up {
      background: linear-gradient(135deg, rgba(55,201,151,0.22), rgba(49,182,255,0.16));
      color: #107357;
    }

    .tendency.down {
      background: linear-gradient(135deg, rgba(255,92,159,0.20), rgba(255,127,80,0.14));
      color: #a33a63;
    }

    .tendency.flat {
      background: linear-gradient(135deg, rgba(91,124,255,0.18), rgba(138,92,255,0.12));
      color: #4d62a7;
    }

    .section-spieltag .table-wrap th.col-game,
    .section-spieltag .table-wrap td.col-game {
      background: linear-gradient(180deg, rgba(122, 181, 255, 0.34), rgba(122, 181, 255, 0.18)) !important;
      color: #184b8f;
      font-weight: 800;
    }

    .section-spieltag .table-wrap th.col-total,
    .section-spieltag .table-wrap td.col-total {
      background: linear-gradient(180deg, rgba(166, 122, 255, 0.24), rgba(166, 122, 255, 0.10)) !important;
      color: #6642a3;
      font-weight: 800;
    }

    .section-spieltag .table-wrap th.col-average,
    .section-spieltag .table-wrap td.col-average {
      background: linear-gradient(180deg, rgba(255, 132, 196, 0.22), rgba(255, 132, 196, 0.10)) !important;
      color: #a13c73;
      font-weight: 800;
    }

    .section-spieltag .table-wrap td.score-200 {
      background: linear-gradient(180deg, rgba(18, 104, 255, 0.96), rgba(75, 149, 255, 0.90)) !important;
      color: #ffffff !important;
      font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.28);
      text-shadow: 0 1px 0 rgba(0,0,0,0.10);
    }

    .section-einzel .table-wrap th.col-series,
    .section-einzel .table-wrap td.col-series {
      background: linear-gradient(180deg, rgba(255, 206, 92, 0.26), rgba(255, 206, 92, 0.10)) !important;
      color: #946300;
      font-weight: 800;
    }

    .section-einzel .table-wrap th.col-best,
    .section-einzel .table-wrap td.col-best {
      background: linear-gradient(180deg, rgba(255, 132, 196, 0.24), rgba(255, 132, 196, 0.10)) !important;
      color: #a13c73;
      font-weight: 800;
    }

    .section-einzel .table-wrap th.col-total,
    .section-einzel .table-wrap td.col-total {
      background: linear-gradient(180deg, rgba(91,124,255,0.22), rgba(91,124,255,0.10)) !important;
      color: #35579c;
      font-weight: 800;
    }

    .section-einzel .table-wrap th.col-average,
    .section-einzel .table-wrap td.col-average {
      background: linear-gradient(180deg, rgba(51,198,255,0.22), rgba(51,198,255,0.10)) !important;
      color: #0e6e95;
      font-weight: 800;
    }

    .section-einzel .table-wrap th.col-average-last,
    .section-einzel .table-wrap td.col-average-last {
      background: linear-gradient(180deg, rgba(55,201,151,0.22), rgba(55,201,151,0.10)) !important;
      color: #177355;
      font-weight: 800;
    }

    .section-einzel .table-wrap th.col-200,
    .section-einzel .table-wrap td.col-200 {
      background: linear-gradient(180deg, rgba(255,184,77,0.22), rgba(255,184,77,0.10)) !important;
      color: #945b00;
      font-weight: 800;
    }

    .section-team .table-wrap th.col-points,
    .section-team .table-wrap td.col-points,
    .section-team .table-wrap th.col-result,
    .section-team .table-wrap td.col-result {
      background: linear-gradient(180deg, rgba(255,184,77,0.24), rgba(255,184,77,0.10)) !important;
      color: #945b00;
      font-weight: 800;
    }

    .section-team .table-wrap th.col-total,
    .section-team .table-wrap td.col-total {
      background: linear-gradient(180deg, rgba(138,92,255,0.22), rgba(138,92,255,0.10)) !important;
      color: #6642a3;
      font-weight: 800;
    }

    .section-team .table-wrap th.col-average,
    .section-team .table-wrap td.col-average {
      background: linear-gradient(180deg, rgba(255,132,196,0.22), rgba(255,132,196,0.10)) !important;
      color: #a13c73;
      font-weight: 800;
    }

    .section-team .table-wrap th.col-round,
    .section-team .table-wrap td.col-round {
      background: linear-gradient(180deg, rgba(51,198,255,0.24), rgba(51,198,255,0.10)) !important;
      color: #0e6e95;
      font-weight: 800;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .action-btn {
      border: 0;
      cursor: pointer;
      font: inherit;
      padding: 14px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #5b7cff, #ff5c9f);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(91, 124, 255, 0.20);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.80);
      color: #5e7395;
      border: 1px solid rgba(122,146,182,0.14);
      box-shadow: 0 10px 24px rgba(35, 58, 100, 0.05);
    }

    .footer-note a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid rgba(108, 123, 150, 0.34);
  transition: opacity 0.2s ease, border-color 0.2s ease;
}

.footer-note a:hover {
  opacity: 1;
  border-bottom-color: rgba(108, 123, 150, 0.75);
}

    const pageTitle = document.getElementById("pageTitle");

    const warningText = document.getElementById("warningText");

    function normalizeLine(line) {
      return line.replace(/\u00A0/g, " ").trimEnd();
    }

    function splitColumns(line) {
      if (line.includes("\t")) {
        return line.split("\t").map(cell => cell.trim());
      }
      return line.trim().split(/\s{2,}/).map(cell => cell.trim());
    }

    function parseGermanNumber(value) {
      if (value === null || value === undefined) return NaN;
      const normalized = String(value).replace(/\./g, "").replace(",", ".").trim();
      return Number(normalized);
    }

    function isMostlyEmptyRow(cells) {
      const filled = cells.filter(cell => cell !== "");
      return filled.length <= 1 && /^\d+$/.test(filled[0] || "");
    }

    function isSingleTitleLine(line) {
      const trimmed = line.trim();
      return !trimmed.includes("\t") && !/\s{2,}/.test(trimmed) && /[A-Za-zÄÖÜäöü]/.test(trimmed);
    }

    function isSeparatorRow(cells) {
      const filled = cells.filter(Boolean);
      return filled.length > 0 && filled.every(cell => /^⚔️+$|^⚔️$/u.test(cell));
    }

    function parseStatLine(line) {
      const parts = splitColumns(line).filter(Boolean);
      if (!parts.length) return null;

      const first = (parts[0] || "").replace(/:$/, "").trim();

      if (/^Bestes Spiel$/i.test(first)) {
        return {
          label: "Bestes Spiel",
          value: parts.slice(1).join(" · ")
        };
      }

      if (/^Hausligaschnitt$/i.test(first)) {
        return {
          label: "Hausligaschnitt",
          value: parts.slice(1).join(" · ")
        };
      }

      return null;
    }

    function headerKey(value) {
      return (value || "").toLowerCase().trim();
    }

    function getColumnClass(sectionKey, header) {
      const h = headerKey(header);

      if (h.includes("platz")) return "col-rank";
      if (h.includes("tendenz")) return "col-trend";
      if (h === "name") return "col-name text-left";
      if (h === "team") return "col-team text-left";
      if (h.startsWith("spiel ")) return "col-game col-short";
      if (h.startsWith("runde ")) return "col-round";
      if (h.includes("beste serie")) return "col-series col-medium";
      if (h.includes("bestes spiel")) return "col-best col-medium";
      if (h.includes("pins gesamt")) return "col-total col-long";
      if (h === "pins") return "col-total col-long";
      if (h.includes("gesamt")) return "col-total col-long";
      if (h === "punkte") return "col-points col-medium";
      if (h === "ergebnis") return "col-result";
      if (h.includes("letzte saison")) return "col-average-last col-medium";
      if (h.includes("> 200")) return "col-200 col-medium";
      if (h.includes("⌀") || h.includes("schnitt")) return "col-average col-medium";
      if (h === "spiele" || h === "spieltage") return "col-short";
      return "col-medium";
    }

    function parseTableRaw(rawText, fallbackLabel, options = {}) {
      const lines = rawText
  .replace(/\r/g, "")
  .split("\n")
  .map(normalizeLine);

      let sectionTitle = fallbackLabel;
      let headers = [];
      let rows = [];
      let stats = [];
      let warnings = [];
      let titleConsumed = false;

      for (const line of lines) {
        if (line.trim() === "") {
  if (options.keepBlankSeparators && headers.length) {
    rows.push({ type: "blank-separator", cells: [] });
  }
  continue;
}
        if (!titleConsumed && isSingleTitleLine(line) && !line.includes("Platz")) {
          sectionTitle = line.trim();
          titleConsumed = true;
          continue;
        }

        const stat = parseStatLine(line);
        if (stat) {
          stats.push(stat);
          continue;
        }

        const cells = splitColumns(line);

        if (!cells.length) continue;
        if (isMostlyEmptyRow(cells)) continue;

        if (isSeparatorRow(cells)) {
          if (headers.length) {
            const normalized = [...cells];
            while (normalized.length < headers.length) normalized.push("⚔️");
            rows.push({ type: "separator", cells: normalized.slice(0, headers.length) });
          }
          continue;
        }

        if (!headers.length) {
          headers = cells.filter(cell => cell !== "");
          continue;
        }

        let cleanCells = cells.slice();

        while (cleanCells.length < headers.length) {
          cleanCells.push("");
        }

        if (cleanCells.length > headers.length) {
          warnings.push(`Zeile mit zu vielen Werten in „${fallbackLabel}“ erkannt.`);
          cleanCells = cleanCells.slice(0, headers.length);
        }

        rows.push({ type: "data", cells: cleanCells });
      }

      if (!headers.length) {
        warnings.push(`Keine Kopfzeile erkannt in „${fallbackLabel}“.`);
      }

      return { sectionTitle, headers, rows, stats, warnings };
    }

    function renderTendency(value) {
      const num = Number(String(value).replace(",", "."));
      const span = document.createElement("span");
      span.className = "tendency";

      if (num > 0) {
        span.classList.add("up");
        span.textContent = `+${num}`;
      } else if (num < 0) {
        span.classList.add("down");
        span.textContent = `${num}`;
      } else {
        span.classList.add("flat");
        span.textContent = "0";
      }

      return span;
    }

    function createCellContent(sectionKey, header, value) {
      const h = headerKey(header);

      if (h.includes("tendenz") && value !== "") {
        return renderTendency(value);
      }

      const span = document.createElement("span");
      span.textContent = value;

      if (value === "" || value === "0,0") {
        span.classList.add("muted-cell");
      }

      return span;
    }

    function createTableElement(parsed, sectionKey) {
      if (!parsed.headers.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "Keine Daten vorhanden.";
        return empty;
      }

      const table = document.createElement("table");

      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");

      parsed.headers.forEach(header => {
        const th = document.createElement("th");
        th.textContent = header;
        th.className = getColumnClass(sectionKey, header);
        headRow.appendChild(th);
      });

      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      parsed.rows.forEach(row => {
        const tr = document.createElement("tr");

if (row.type === "separator") {
  tr.className = "separator-row";
} else if (row.type === "blank-separator") {
  tr.className = "blank-separator";
} else {
  tr.className = "data-row";
}
if (row.type === "blank-separator") {
  const td = document.createElement("td");
  td.colSpan = parsed.headers.length;
  tr.appendChild(td);
  tbody.appendChild(tr);
  return;
}
        row.cells.forEach((cell, index) => {
          const currentHeader = parsed.headers[index] || "";
          const td = document.createElement("td");
          td.className = getColumnClass(sectionKey, currentHeader);

          if (row.type === "separator") {
            td.textContent = cell || "⚔️";
          } else {
            td.appendChild(createCellContent(sectionKey, currentHeader, cell));

            if (
              sectionKey === "spieltag" &&
              /^spiel\s*[1-4]$/i.test(currentHeader) &&
              parseGermanNumber(cell) >= 200
            ) {
              td.classList.add("score-200");
            }
          }

          tr.appendChild(td);
        });

        if (row.type === "data") {
          tr.addEventListener("click", () => {
            const selected = tr.classList.contains("is-selected");
            tbody.querySelectorAll(".data-row").forEach(r => r.classList.remove("is-selected"));
            if (!selected) tr.classList.add("is-selected");
          });
        }

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      return table;
    }

    function createStatsChips(stats) {
      if (!stats.length) return null;

      const wrap = document.createElement("div");
      wrap.className = "stats-chips";

      stats.forEach(stat => {
        const chip = document.createElement("div");
        chip.className = "stat-chip";
        chip.textContent = `${stat.label}: ${stat.value}`;
        wrap.appendChild(chip);
      });

      return wrap;
    }

    function createStandardSection(section) {
      const parsed = parseTableRaw(section.raw, section.label);

      const card = document.createElement("section");
      card.className = `table-card ${section.theme} section-${section.key}`;

      const head = document.createElement("div");
      head.className = "table-head";

      const titleWrap = document.createElement("div");
      titleWrap.className = "table-title-wrap";

      const title = document.createElement("h2");
      title.className = "table-title";
      title.textContent = parsed.sectionTitle;

      const subtitle = document.createElement("div");
      subtitle.className = "table-subtitle";
      subtitle.textContent = `${parsed.rows.filter(r => r.type === "data").length} Zeilen · ${parsed.headers.length} Spalten`;

      titleWrap.appendChild(title);
      titleWrap.appendChild(subtitle);
      head.appendChild(titleWrap);

      const stats = createStatsChips(parsed.stats);
      if (stats) head.appendChild(stats);

      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      wrap.appendChild(createTableElement(parsed, section.key));

      card.appendChild(head);
      card.appendChild(wrap);

      return { element: card, warnings: parsed.warnings };
    }

    function createCompositeSection(section) {
      const topParsed = parseTableRaw(section.top.raw, section.top.label);
      const bottomParsed = parseTableRaw(section.bottom.raw, section.bottom.label, { keepBlankSeparators: true });

      const card = document.createElement("section");
      card.className = `table-card ${section.theme} section-${section.key}`;

      const head = document.createElement("div");
      head.className = "table-head";

      const titleWrap = document.createElement("div");
      titleWrap.className = "table-title-wrap";

      const title = document.createElement("h2");
      title.className = "table-title";
      title.textContent = section.label;

      const subtitle = document.createElement("div");
      subtitle.className = "table-subtitle";
      subtitle.textContent = "Mannschaftswertung und Spieltagsduelle";

      titleWrap.appendChild(title);
      titleWrap.appendChild(subtitle);
      head.appendChild(titleWrap);

      card.appendChild(head);

      const stacked = document.createElement("div");
      stacked.className = "stacked-tables";

      const topShell = document.createElement("div");
      topShell.className = "subtable-shell";

      const topHead = document.createElement("div");
      topHead.className = "subtable-head";
      topHead.innerHTML = `<h3 class="subtable-title">${topParsed.sectionTitle}</h3>`;

      const topWrap = document.createElement("div");
      topWrap.className = "table-wrap";
      topWrap.appendChild(createTableElement(topParsed, section.key));

      topShell.appendChild(topHead);
      topShell.appendChild(topWrap);

      const bottomShell = document.createElement("div");
      bottomShell.className = "subtable-shell";

      const bottomHead = document.createElement("div");
      bottomHead.className = "subtable-head";
      bottomHead.innerHTML = `<h3 class="subtable-title">${section.bottom.label}</h3>`;

      const bottomWrap = document.createElement("div");
      bottomWrap.className = "table-wrap";
      bottomWrap.appendChild(createTableElement(bottomParsed, section.key));

      bottomShell.appendChild(bottomHead);
      bottomShell.appendChild(bottomWrap);

      stacked.appendChild(topShell);
      stacked.appendChild(bottomShell);

      card.appendChild(stacked);

      return {
        element: card,
        warnings: [...topParsed.warnings, ...bottomParsed.warnings]
      };
    }

    function renderPage() {
      pageTitle.innerHTML = `${PAGE_DATA.title}. <span class="headline-accent">Ergebnisse im Überblick.</span>`;
      pageDate.textContent = PAGE_DATA.date;

      sectionsGrid.innerHTML = "";

      const warnings = [];

      PAGE_DATA.sections.forEach(section => {
        let built;

        if (section.type === "composite") {
          built = createCompositeSection(section);
        } else {
          built = createStandardSection(section);
        }

        warnings.push(...built.warnings);
        sectionsGrid.appendChild(built.element);
      });

      if (warnings.length) {
        warningText.textContent = warnings[0];
        warningPill.classList.add("show");
      } else {
        warningPill.classList.remove("show");
      }
    }

    renderPage();
  </script>
  <button
  class="back-fab"
  type="button"
  aria-label="Zurück zur Startseite"
  title="Zurück zur Startseite"
  onclick="location.href='index.html'"
>
  <i class="fa-solid fa-arrow-left"></i>
</button>

<button
  class="refresh-fab"
  type="button"
  aria-label="Seite aktualisieren"
  title="Seite aktualisieren"
  onclick="window.location.reload()"
>
  <i class="fa-solid fa-rotate-right"></i>
</button>
</body>
</html>
