<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strikeclub Velten – Mini-Spiel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --text: #0f172a;
      --text-soft: #60728f;
      --border: rgba(119, 145, 185, 0.14);
      --shadow-xl: 0 30px 80px rgba(35, 58, 100, 0.14);
      --shadow-lg: 0 18px 46px rgba(35, 58, 100, 0.10);
      --max-width: 1200px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(91, 124, 255, 0.10), transparent 30%),
        radial-gradient(circle at 92% 10%, rgba(255, 92, 159, 0.10), transparent 24%),
        radial-gradient(circle at 82% 84%, rgba(51, 198, 255, 0.12), transparent 30%),
        linear-gradient(180deg, #fbfdff 0%, #f4f8ff 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(72px);
      opacity: 0.42;
      animation: drift 18s ease-in-out infinite;
    }

    .glow.one {
      width: 320px;
      height: 320px;
      left: -70px;
      top: 40px;
      background: rgba(91, 124, 255, 0.16);
    }

    .glow.two {
      width: 280px;
      height: 280px;
      right: -30px;
      top: 140px;
      background: rgba(255, 92, 159, 0.12);
      animation-delay: -6s;
    }

    .glow.three {
      width: 360px;
      height: 360px;
      right: 16%;
      bottom: -90px;
      background: rgba(51, 198, 255, 0.14);
      animation-delay: -11s;
    }

    .site {
      position: relative;
      z-index: 2;
      width: min(var(--max-width), calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 54px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(122, 146, 182, 0.14);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(35, 58, 100, 0.06);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(91,124,255,1), rgba(255,92,159,1));
      color: #fff;
      box-shadow: 0 8px 20px rgba(91, 124, 255, 0.24);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(122, 146, 182, 0.14);
      color: var(--text-soft);
      font-weight: 700;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(35, 58, 100, 0.06);
    }

    .page {
      position: relative;
      padding: 30px;
      border-radius: 34px;
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.76));
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 10%, rgba(91, 124, 255, 0.08), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(255, 92, 159, 0.06), transparent 22%),
        radial-gradient(circle at 70% 100%, rgba(51, 198, 255, 0.08), transparent 28%);
      pointer-events: none;
    }

    .page-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 540px;
      gap: 28px;
      align-items: start;
    }

    .copy {
      text-align: left;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(122, 146, 182, 0.12);
      font-weight: 700;
      font-size: 0.92rem;
      color: #36507a;
      margin-bottom: 18px;
      box-shadow: 0 10px 24px rgba(35, 58, 100, 0.04);
    }

    .eyebrow .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3bc7ff, #7a5cff);
      box-shadow: 0 0 0 6px rgba(91, 124, 255, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 800;
      max-width: 10ch;
    }

    .headline-accent {
      background: linear-gradient(135deg, #0f172a 0%, #4964ff 44%, #ff5c9f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .copy p {
      margin: 18px 0 0;
      max-width: 52ch;
      font-size: 1.04rem;
      line-height: 1.72;
      color: var(--text-soft);
    }

    .tips {
      margin-top: 22px;
      display: grid;
      gap: 12px;
      max-width: 440px;
    }

    .tip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(122, 146, 182
