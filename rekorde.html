<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Rekorde - Strikeclub Velten</title> <meta property="og:title" content="Rekorde - Strikeclub Velten" /> <meta property="og:description" content="Die wichtigsten Bestmarken der Saison im Überblick." /> <meta property="og:url" content="https://www.strikeclub-velten.de/rekorde.html" /> <meta property="og:type" content="website" /> <link rel="preconnect" href="https://fonts.googleapis.com" /> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /> <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" /> <style> :root { --text: #0f172a; --text-soft: #5f718d; --border: rgba(119, 145, 185, 0.14); --shadow-xl: 0 30px 80px rgba(35, 58, 100, 0.14); --shadow-lg: 0 18px 46px rgba(35, 58, 100, 0.10); --shadow-md: 0 12px 30px rgba(35, 58, 100, 0.08); --max-width: 1440px; } * { box-sizing: border-box; } body { margin: 0; min-height: 100vh; font-family: "Inter", Arial, sans-serif; color: var(--text); background: radial-gradient(circle at 10% 10%, rgba(91, 124, 255, 0.12), transparent 30%), radial-gradient(circle at 92% 10%, rgba(255, 92, 159, 0.12), transparent 24%), radial-gradient(circle at 82% 84%, rgba(51, 198, 255, 0.14), transparent 30%), linear-gradient(180deg, #fbfdff 0%, #f3f8ff 100%); overflow-x: hidden; } a { color: inherit; text-decoration: none; } .scene { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; } .glow { position: absolute; border-radius: 50%; filter: blur(76px); opacity: 0.44; animation: drift 18s ease-in-out infinite; } .glow.one { width: 340px; height: 340px; left: -80px; top: 40px; background: rgba(91, 124, 255, 0.16); } .glow.two { width: 290px; height: 290px; right: -30px; top: 140px; background: rgba(2 : 14px; } .brand { display: inline-flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 999px; background: rgba(255, 255, 255, 0.76); border: 1px solid rgba(122, 146, 182, 0.14); backdrop-filter: blur(14px); box-shadow: 0 8px 24px rgba(35, 58, 100, 0.06); font-weight: 700; letter-spacing: -0.02em; } .brand-mark { width: 34px; height: 34px; border-radius: 50%; display: inline-grid; place-items: center; background: linear-gradient(135deg, rgba(91, 124, 255, 1), rgba(255, 92, 159, 1)); color: #fff; box-shadow: 0 8px 20px rgba(91, 124, 255, 0.24); } .page { position: relative; padding: 20px; border-radius: 26px; background: linear-gradient(180deg, rgba(255, 255, 255, 0.90), rgba(255, 255, 255, 0.80)); border: 1px solid var(--border); backdrop-filter: blur(24px); box-shadow: var(--shadow-xl); overflow: hidden; } .page::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 12% 10%, rgba(91, 124, 255, 0.10), transparent 28%), radial-gradient(circle at 86% 18%, rgba(255, 92, 159, 0.08), transparent 22%), radial-gradient(circle at 72% 100%, rgba(51, 198, 255, 0.10), transparent 28%); pointer-events: none; } .header { position: relative; z-index: 1; margin-bottom: 22px; } .eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 999px; background: rgba(255, 255, 255, 0.76); border: 1px solid rgba(122, 146, 182, 0.12); font-weight: 700; font-size: 0.9rem; color: #36507a; margin-bottom: 14px; box-shadow: 0 10px 24px rgba(35, 58, 100, 0.04); } .eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, #3bc7ff, #7a5cff); box-shadow: 0 0 0 6px rgba(91, 124, 255, 0.08); } h1 { margin: 0 0 14px; font-size: clamp(2rem, 4vw, 3.6rem); line-height: 0.96; letter-spacing: -0.06em; font-weight: 800; } .headline-accent { background: linear-gradient(135deg, #0f172a 0%, #4964ff 44%, #ff5c9f 100%); -webkit-background-clip: text; background-clip: text; color: transparent; } .records-grid { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; } .record-card { position: relative; padding: 18px; border-radius: 22px; background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(246, 250, 255, 0.90)); border: 1px solid rgba(122, 146, 182, 0.10); box-shadow: var(--shadow-md); overflow: hidden; } .record-card::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 12% 12%, rgba(91, 124, 255, 0.12), transparent 28%), radial-gradient(circle at 88% 18%, rgba(255, 92, 159, 0.10), transparent 22%), radial-gradient(circle at 72% 100%, rgba(51, 198, 255, 0.10), transparent 28%); } .record-card.featured { background: linear-gradient(135deg, rgba(91, 124, 255, 0.16), rgba(255, 92, 159, 0.12)), rgba(255, 255, 255, 0.92); border: 1px solid rgba(91, 124, 255, 0.18); box-shadow: 0 16px 36px rgba(73, 100, 255, 0.14); } .record-inner { position: relative; z-index: 1; } .record-label { display: block; margin-bottom: 10px; font-size: 0.78rem; font-weight: 900; color: #657891; text-transform: uppercase; letter-spacing: 0.06em; } .record-value { margin-bottom: 8px; font-size: clamp(1.45rem, 3vw, 2.25rem); font-weight: 900; color: #16203d; letter-spacing: -0.05em; line-height: 1; } .record-detail { color: #5a6f90; font-size: 0.95rem; line-height: 1.6; font-weight: 700; } .record-players { margin-top: 12px; padding: 10px 12px; border-radius: 16px; background: rgba(255, 255, 255, 0.84); border: 1px solid rgba(122, 146, 182, 0.10); color: #4f6484; font-size: 0.82rem; line-height: 1.5; font-weight: 700; } .record-chip { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; padding: 8px 12px; border-radius: 999px; background: rgba(255, 255, 255, 0.86); border: 1px solid rgba(122, 146, 182, 0.10); color: #516784; font-size: 0.8rem; font-weight: 800; box-shadow: 0 8px 18px rgba(35, 58, 100, 0.04); } .error-box { position: relative; z-index: 1; padding: 18px; border-radius: 20px; background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(246, 250, 255, 0.90)); border: 1px solid rgba(255, 127, 80, 0.18); box-shadow: var(--shadow-md); color: #8a4b2b; font-weight: 700; line-height: 1.6; } .footer-note { margin-top: 16px; text-align: center; color: #6c7b96; font-size: 0.92rem; padding: 0 8px; } .footer-note a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(108, 123, 150, 0.34); transition: opacity 0.2s ease, border-color 0.2s ease; } .footer-note a:hover { opacity: 1; border-bottom-color: rgba(108, 123, 150, 0.75); } .refresh-fab, .back-fab { position: fixed; bottom: 18px; z-index: 9999; width: 52px; height: 52px; border: 0; border-radius: 50%; display: grid; place-items: center; cursor: pointer; color: #ffffff; background: linear-gradient(135deg, rgba(91, 124, 255, 0.92), rgba(255, 92, 159, 0.92)); box-shadow: 0 10px 24px rgba(15, 23, 42, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.28); backdrop-filter: blur(10px); transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease; } .refresh-fab { right: 18px; } .back-fab { left: 18px; } .refresh-fab i { font-size: 1rem; animation: refreshSpin 2.4s linear infinite; } .back-fab i { font-size: 1rem; animation: backPulse 1.6s ease-in-out infinite; } .refresh-fab:hover, .back-fab:hover { transform: translateY(-2px) scale(1.05); filter: saturate(1.08); box-shadow: 0 14px 28px rgba(15, 23, 42, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.32); } .refresh-fab:hover i { animation-duration: 0.9s; } .back-fab:hover i { animation-duration: 0.8s; } .refresh-fab:active, .back-fab:active { transform: scale(0.96); } @keyframes drift { 0%, 100% { transform: translate3d(0, 0, 0) scale(1); } 50% { transform: translate3d(24px, -18px, 0) scale(1.08); } } @keyframes floatBall { 0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); } 25% { transform: translate3d(18px, -28px, 0) rotate(6deg) scale(1.02); } 50% { transform: translate3d(-16px, 20px, 0) rotate(-7deg) scale(0.98); } 75% { transform: translate3d(24px, -12px, 0) rotate(4deg) scale(1.01); } } @keyframes swayPin { 0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); } 25% { transform: translate3d(14px, -22px, 0) rotate(3deg); } 50% { transform: translate3d(-10px, 14px, 0) rotate(-4deg); } 75% { transform: translate3d(16px, -10px, 0) rotate(2deg); } } @keyframes refreshSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes backPulse { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-4px); } } @media (max-width: 980px) { .site { width: min(var(--max-width), calc(100% - 12px)); } .page { padding: 14px; } .records-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } } @media (max-width: 700px) { .site { width: 100%; padding: 0 0 22px; } .topbar { padding: 10px 8px 0; margin-bottom: 8px; } .page { border-radius: 0; border-left: 0; border-right: 0; padding: 12px 6px 16px; } .records-grid { grid-template-columns: 1fr; } h1 { font-size: clamp(1.8rem, 8vw, 2.8rem); } .refresh-fab, .back-fab { width: 48px; height: 48px; bottom: 14px; } .refresh-fab { right: 14px; } .back-fab { left: 14px; } .refresh-fab i, .back-fab i { font-size: 0.95rem; } } @media (prefers-reduced-motion: reduce) { .glow, .bg-shape, .refresh-fab i, .back-fab i { animation: none !important; } } </style> </head> <body> <div class="scene" aria-hidden="true"> <div class="glow one"></div> <div class="glow two"></div> <div class="glow three"></div> <div class="bg-shape ball-bg" style="--size: 150px; --x: 7%; --y: 16%; --c1:#6ea8ff; --c2:#8b5cff; --dur:19s; --delay:-2s;" ></div> <div class="bg-shape ball-bg" style="--size: 112px; --x: 84%; --y: 14%; --c1:#ff6aa8; --c2:#ff9b63; --dur:16s; --delay:-7s;" ></div> <div class="bg-shape ball-bg" style="--size: 132px; --x: 78%; --y: 74%; --c1:#42d1ff; --c2:#6b7cff; --dur:22s; --delay:-5s;" ></div> <div class="bg-shape pin-bg" style="--x: 18%; --y: 10%; --dur:18s; --delay:-4s;" ></div> <div class="bg-shape pin-bg" style="--x: 92%; --y: 34%; --dur:15s; --delay:-8s; --w:50px; --h:150px;" ></div> </div> <main class="site"> <div class="topbar"> <div class="brand"> <span class="brand-mark"><i class="fa-solid fa-bowling-ball"></i></span> <span>Strikeclub Velten</span> </div> </div> <section class="page"> <div class="header"> <div> <div class="eyebrow"> <span class="dot"></span> <span>Rekorde</span> </div> <h1> Bestmarken. <span class="headline-accent">Automatisch aus den aktuellen Daten.</span> </h1> </div> </div> <section class="records-grid" id="recordsGrid"></section> </section> <p class="footer-note"> Strikeclub Velten · <a href="impressum.html">Impressum</a> </p> </main> <button class="back-fab" type="button" aria-label="Zurück zur Startseite" title="Zurück zur Startseite" onclick="location.href='index.html'" > <i class="fa-solid fa-arrow-left"></i> </button> <button class="refresh-fab" type="button" aria-label="Seite aktualisieren" title="Seite aktualisieren" onclick="window.location.reload()" > <i class="fa-solid fa-rotate-right"></i> </button> <script src="liga-daten.js"></script> <script> const recordsGrid = document.getElementById("recordsGrid"); const sharedData = window.STRIKECLUB_DATA || null; function formatNumber(value, digits = 1) { return new Intl.NumberFormat("de-DE", { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(value); } function formatPercent(value) { const sign = value > 0 ? "+" : ""; return `${sign}${formatNumber(value, 1)} %`; } function parseGermanNumber(value) { if (value === null || value === undefined) return NaN; const normalized = String(value) .trim() .replace(/\./g, "") .replace(",", "."); return Number(normalized); } function normalizeLine(line) { return String(line || "").replace(/\u00A0/g, " ").trimEnd(); } function splitColumns(line) { if (line.includes("\t")) { return line.split("\t").map((cell) => cell.trim()); } return line.trim().split(/\s{2,}/).map((cell) => cell.trim()); } function isSingleTitleLine(line) { const trimmed = line.trim(); return ( !trimmed.includes("\t") && !/\s{2,}/.test(trimmed) && /[A-Za-zÄÖÜäöü]/.test(trimmed) ); } function parseTableRaw(rawText, fallbackLabel) { const lines = String(rawText || "") .replace(/\r/g, "") .split("\n") .map(normalizeLine); let sectionTitle = fallbackLabel; let headers = []; let rows = []; let titleConsumed = false; for (const line of lines) { if (!line.trim()) continue; if (!titleConsumed && isSingleTitleLine(line) && !line.includes("Platz")) { sectionTitle = line.trim(); titleConsumed = true; continue; } if (/^Bestes Spiel:/i.test(line) || /^Hausligaschnitt:/i.test(line)) { continue; } if (line.includes("⚔️")) { continue; } const cells = splitColumns(line); if (!cells.length) continue; const usefulCells = cells.filter(Boolean); if (!headers.length) { headers = usefulCells; continue; } const cleanCells = cells.slice(0, headers.length); while (cleanCells.length < headers.length) cleanCells.push(""); const isDuplicateHeader = cleanCells.every((cell, index) => { return ( String(cell).trim().toLowerCase() === String(headers[index] || "").trim().toLowerCase() ); }); if (isDuplicateHeader) continue; const filled = cleanCells.filter(Boolean); if (filled.length <= 1 && /^\d+$/.test(filled[0] || "")) continue; rows.push(cleanCells); } return { sectionTitle, headers, rows }; } function rowsToObjects(parsed) { return parsed.rows.map((row) => { const obj = {}; parsed.headers.forEach((header, index) => { obj[header] = row[index] ?? ""; }); return obj; }); } function parseGermanDate(dateStr) { const match = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(String(dateStr || "").trim()); if (!match) return null; const [, dd, mm, yyyy] = match; return new Date(Number(yyyy), Number(mm) - 1, Number(dd), 12, 0, 0, 0); } function isPastOrToday(dateStr) { const date = parseGermanDate(dateStr); if (!date) return false; const now = new Date(); const todayEnd = new Date( now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999 ); return date <= todayEnd; } function parseBool(value) { return String(value || "").trim().toLowerCase() === "true"; } function parsePlayerTable(raw) { const lines = String(raw || "") .replace(/\r/g, "") .split("\n") .map((line) => line.trimEnd()) .filter((line) => line.trim() !== ""); if (lines.length < 3) return {}; const spieltagLabels = lines[0].match(/Spieltag\s+\d+/g) || []; if (!spieltagLabels.length) return {}; const result = {}; for (const line of lines.slice(2)) { const cells = line.split("\t").map((cell) => cell.trim()); const name = cells[0]; if (!name) continue; const entries = []; for (let i = 0; i < spieltagLabels.length; i++) { const base = 1 + i * 4; const datum = cells[base] || ""; const pinsRaw = cells[base + 1] || "0"; const gamesRaw = cells[base + 2] || "0"; const presentRaw = cells[base + 3] || "false"; if (!datum || !isPastOrToday(datum)) continue; const played = parseBool(presentRaw); const pins = Number(pinsRaw); const games = Number(gamesRaw); entries.push({ spieltag: i + 1, datum, pins: played ? pins : null, games: played ? games : 0, played }); } result[name] = entries; } return result; } function getConsistencyWinner(playerData) { let best = null; for (const [name, entries] of Object.entries(playerData)) { const values = entries .filter((entry) => entry.played && typeof entry.pins === "number" && entry.games > 0) .map((entry) => entry.pins / entry.games); if (values.length < 4) continue; const mean = values.reduce((sum, value) => sum + value, 0) / values.length; const variance = values.reduce((sum, value) => { const diff = value - mean; return sum + diff * diff; }, 0) / values.length; const stdDev = Math.sqrt(variance); const score = Math.max(0, Math.min(100, Math.round(100 - stdDev * 2.5))); if (!best || score > best.score) { best = { name, score, stdDev }; } } return best; } function getBestRowByNumber(rows, key, resultKey = "value") { let best = null; for (const row of rows) { const value = parseGermanNumber(row[key]); if (!Number.isFinite(value)) { continue; } if (!best || value > best[resultKey]) { best = { row, [resultKey]: value }; } } return best; } function createRecordCard(record) { const article = document.createElement("article"); article.className = `record-card${record.featured ? " featured" : ""}`; article.innerHTML = ` <div class="record-inner"> <span class="record-label">${record.label}</span> <div class="record-value">${record.value}</div> <div class="record-detail">${record.detail}</div> ${record.players ? `<div class="record-players">${record.players}</div>` : ""} ${ record.chip ? ` <div class="record-chip"> <i class="${record.icon}"></i> <span>${record.chip}</span> </div> ` : "" } </div> `; return article; } function renderError(message) { recordsGrid.innerHTML = ""; const box = document.createElement("div"); box.className = "error-box"; box.textContent = message; recordsGrid.appendChild(box); } function buildRecords() { if (!sharedData || !sharedData.pageData || !sharedData.rawPlayerTable) { renderError("Gemeinsame Datenbasis nicht gefunden. Prüfe, ob liga-daten.js richtig eingebunden ist."); return; } const PAGE_DATA = sharedData.pageData; const RAW_PLAYER_TABLE = sharedData.rawPlayerTable; const einzelSection = PAGE_DATA.sections.find((section) => section.key === "einzel"); const teamSection = PAGE_DATA.sections.find((section) => section.key === "team"); if (!einzelSection || !teamSection) { renderError("Die benötigten Tabellen wurden nicht gefunden."); return; } const einzelRows = rowsToObjects(parseTableRaw(einzelSection.raw, "Einzelwertung")); const teamTopRows = rowsToObjects(parseTableRaw(teamSection.top.raw, "Mannschaftswertung")); const teamBottomRows = rowsToObjects(parseTableRaw(teamSection.bottom.raw, teamSection.bottom.label)); if (!einzelRows.length || !teamTopRows.length || !teamBottomRows.length) { renderError("Mindestens eine Tabelle konnte nicht sauber gelesen werden."); return; } const teamPlayersMap = new Map(); einzelRows.forEach((row) => { const team = row["Team"]; const name = row["Name"]; const avg = parseGermanNumber(row["⌀"]); if (!team || !name) return; if (!teamPlayersMap.has(team)) { teamPlayersMap.set(team, []); } teamPlayersMap.get(team).push({ name, avg }); }); function getTeamPlayers(teamName) { const players = (teamPlayersMap.get(teamName) || []) .sort((a, b) => b.avg - a.avg) .map((player) => player.name); return players.length ? `Spieler: ${players.join(" · ")}` : ""; } const bestPlayday = getBestRowByNumber(einzelRows, "Beste Serie", "value"); const bestSingleGame = getBestRowByNumber(einzelRows, "Bestes Spiel", "value"); const bestSeasonAverage = getBestRowByNumber(einzelRows, "⌀", "value"); const most200Games = getBestRowByNumber(einzelRows, "Spiele > 200", "value"); const bestTeamOverall = getBestRowByNumber(teamTopRows, "Punkte", "points"); const bestTeamDay = getBestRowByNumber(teamBottomRows, "Gesamt", "total"); const bestImprovementCandidates = einzelRows .map((row) => { const current = parseGermanNumber(row["⌀"]); const previous = parseGermanNumber(row["⌀ letzte Saison"]); if (!Number.isFinite(current) || !Number.isFinite(previous) || previous <= 0) { return null; } return { row, current, previous, improvement: ((current - previous) / previous) * 100 }; }) .filter(Boolean); const bestImprovement = bestImprovementCandidates.reduce((best, item) => { if (!best || item.improvement > best.improvement) return item; return best; }, null); const playerData = parsePlayerTable(RAW_PLAYER_TABLE); const bestConsistency = getConsistencyWinner(playerData); const bestPlaydayAverage = bestPlayday ? bestPlayday.value / 4 : null; const records = [ { label: "Bester Spieltag", value: bestPlayday?.row?.["Name"] || "–", detail: bestPlayday ? `${bestPlayday.value} Pins · ${formatNumber(bestPlaydayAverage)} Schnitt` : "Kein Wert", chip: "Serie und Spieltagsschnitt zusammengefasst", icon: "fa-solid fa-trophy", featured: true }, { label: "Bestes Einzelspiel", value: bestSingleGame?.row?.["Name"] || "–", detail: bestSingleGame ? `${bestSingleGame.value} Pins` : "Kein Wert", chip: "Höchster Einzelwert der Saison", icon: "fa-solid fa-bolt" }, { label: "Höchster Gesamtsaisonschnitt", value: bestSeasonAverage?.row?.["Name"] || "–", detail: bestSeasonAverage ? `${formatNumber(bestSeasonAverage.value)} Schnitt` : "Kein Wert", chip: "Platz 1 der Gesamtauswertung", icon: "fa-solid fa-chart-line" }, { label: "Meiste Spiele über 200", value: most200Games?.row?.["Name"] || "–", detail: most200Games ? `${most200Games.value} Spiele über 200` : "Kein Wert", chip: "Konstant starke Einzelspiele", icon: "fa-solid fa-fire" }, { label: "Beste Konstanz", value: bestConsistency?.name || "–", detail: bestConsistency ? `${bestConsistency.score} / 100 Konstanz-Score` : "Kein Wert", chip: "Wenig Schwankung über die Spieltage", icon: "fa-solid fa-wave-square" }, { label: "Beste Verbesserung", value: bestImprovement?.row?.["Name"] || "–", detail: bestImprovement ? `${formatPercent(bestImprovement.improvement)} zur Vorsaison` : "Kein Wert", chip: bestImprovement ? `${formatNumber(bestImprovement.current)} statt ${formatNumber(bestImprovement.previous)} Schnitt` : "Nur mit Vorjahreswert", icon: "fa-solid fa-arrow-trend-up" }, { label: "Bestes Team gesamt", value: bestTeamOverall?.row?.["Team"] || "–", detail: bestTeamOverall ? `${bestTeamOverall.row["Punkte"]} Punkte · ${bestTeamOverall.row["⌀"]} Schnitt` : "Kein Wert", players: bestTeamOverall ? getTeamPlayers(bestTeamOverall.row["Team"]) : "", chip: "Platz 1 der Teamwertung", icon: "fa-solid fa-users" }, { label: "Bester Team-Spieltag", value: bestTeamDay?.row?.["Team"] || "–", detail: bestTeamDay ? `${bestTeamDay.row["Gesamt"]} Pins · ${PAGE_DATA.title}` : "Kein Wert", players: bestTeamDay ? getTeamPlayers(bestTeamDay.row["Team"]) : "", chip: "Höchster Teamwert im aktuellen Spieltag", icon: "fa-solid fa-medal" } ]; recordsGrid.innerHTML = ""; records.forEach((record) => { recordsGrid.appendChild(createRecordCard(record)); }); } buildRecords(); </script> </body> </html>
