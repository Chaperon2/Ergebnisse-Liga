<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekorde - Strikeclub Velten</title>

  <meta property="og:title" content="Rekorde - Strikeclub Velten" />
  <meta property="og:description" content="Die besten Werte der bisher erfassten Spieltage im Überblick." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --text: #0f172a;
      --text-soft: #5f718d;
      --border: rgba(119, 145, 185, 0.14);
      --shadow-xl: 0 30px 80px rgba(35, 58, 100, 0.14);
      --shadow-lg: 0 18px 46px rgba(35, 58, 100, 0.10);
      --max-width: 1440px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(91, 124, 255, 0.12), transparent 30%),
        radial-gradient(circle at 92% 10%, rgba(255, 92, 159, 0.12), transparent 24%),
        radial-gradient(circle at 82% 84%, rgba(51, 198, 255, 0.14), transparent 30%),
        linear-gradient(180deg, #fbfdff 0%, #f3f8ff 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(76px);
      opacity: 0.44;
      animation: drift 18s ease-in-out infinite;
    }

    .glow.one {
      width: 340px;
      height: 340px;
      left: -80px;
      top: 40px;
      background: rgba(91, 124, 255, 0.16);
    }

    .glow.two {
      width: 290px;
      height: 290px;
      right: -30px;
      top: 140px;
      background: rgba(255, 92, 159, 0.14);
      animation-delay: -6s;
    }

    .glow.three {
      width: 380px;
      height: 380px;
      right: 14%;
      bottom: -100px;
      background: rgba(51, 198, 255, 0.16);
      animation-delay: -11s;
    }

    .bg-shape {
      position: absolute;
      opacity: 0.22;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }

    .ball-bg {
      width: var(--size, 120px);
      height: var(--size, 120px);
      left: var(--x, 10%);
      top: var(--y, 10%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 35%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        radial-gradient(circle at 55% 28%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        radial-gradient(circle at 60% 48%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        linear-gradient(145deg, var(--c1, #7c9bff), var(--c2, #b15cff));
      box-shadow:
        inset -18px -18px 30px rgba(255,255,255,0.24),
        inset 18px 18px 28px rgba(255,255,255,0.14),
        0 16px 32px rgba(65, 85, 130, 0.10);
      animation-name: floatBall;
      animation-duration: var(--dur, 18s);
      animation-delay: var(--delay, 0s);
    }

    .pin-bg {
      width: var(--w, 56px);
      height: var(--h, 164px);
      left: var(--x, 15%);
      top: var(--y, 20%);
      border-radius: 40% 40% 42% 42% / 15% 15% 72% 72%;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 40%, #eef4ff 100%);
      box-shadow:
        inset 0 0 0 1px rgba(150, 170, 205, 0.14),
        0 16px 32px rgba(65, 85, 130, 0.08);
      animation-name: swayPin;
      animation-duration: var(--dur, 16s);
      animation-delay: var(--delay, 0s);
      transform-origin: center 82%;
    }

    .pin-bg::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 8px;
      right: 8px;
      height: 18px;
      border-radius: 999px;
      background:
        linear-gradient(180deg,
          rgba(255, 92, 159, 0.84) 0%,
          rgba(255, 92, 159, 0.84) 42%,
          transparent 42%,
          transparent 58%,
          rgba(255, 104, 142, 0.74) 58%,
          rgba(255, 104, 142, 0.74) 100%);
    }

    .site {
      position: relative;
      z-index: 2;
      width: min(var(--max-width), calc(100% - 22px));
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(122, 146, 182, 0.14);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(35, 58, 100, 0.06);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(91,124,255,1), rgba(255,92,159,1));
      color: #fff;
      box-shadow: 0 8px 20px rgba(91, 124, 255, 0.24);
    }

    .page {
      position: relative;
      padding: 20px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(255,255,255,0.80));
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 10%, rgba(91, 124, 255, 0.10), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(255, 92, 159, 0.08), transparent 22%),
        radial-gradient(circle at 72% 100%, rgba(51, 198, 255, 0.10), transparent 28%);
      pointer-events: none;
    }

    .header {
      position: relative;
      z-index: 1;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(122, 146, 182, 0.12);
      font-weight: 700;
      font-size: 0.9rem;
      color: #36507a;
      margin-bottom: 14px;
      box-shadow: 0 10px 24px rgba(35, 58, 100, 0.04);
    }

    .eyebrow .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3bc7ff, #7a5cff);
      box-shadow: 0 0 0 6px rgba(91, 124, 255, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .headline-accent {
      background: linear-gradient(135deg, #0f172a 0%, #4964ff 44%, #ff5c9f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-text {
      margin-top: 14px;
      max-width: 820px;
      color: #5f718d;
      line-height: 1.7;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .info-strip {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(91,124,255,0.12), rgba(255,92,159,0.10));
      border: 1px solid rgba(122,146,182,0.12);
      box-shadow: 0 10px 24px rgba(35, 58, 100, 0.04);
      color: #284164;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.6;
    }

    .records-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .record-card {
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(246,250,255,0.90));
      border: 1px solid rgba(122,146,182,0.10);
      box-shadow: var(--shadow-lg);
    }

    .record-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      color: #6b7d99;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .record-value {
      font-size: 1.45rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #16203d;
      margin-bottom: 8px;
    }

    .record-holder {
      color: #23406c;
      font-size: 0.98rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .record-note {
      color: #627491;
      font-size: 0.86rem;
      line-height: 1.55;
      font-weight: 700;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: #6c7b96;
      font-size: 0.92rem;
      padding: 0 8px;
    }

    .refresh-fab,
    .back-fab {
      position: fixed;
      bottom: 18px;
      z-index: 9999;
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(135deg, rgba(91, 124, 255, 0.92), rgba(255, 92, 159, 0.92));
      box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(10px);
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .refresh-fab { right: 18px; }
    .back-fab { left: 18px; }

    .refresh-fab i {
      font-size: 1rem;
      animation: refreshSpin 2.4s linear infinite;
    }

    .back-fab i {
      font-size: 1rem;
      animation: backPulse 1.6s ease-in-out infinite;
    }

    .refresh-fab:hover,
    .back-fab:hover {
      transform: translateY(-2px) scale(1.05);
      filter: saturate(1.08);
      box-shadow:
        0 14px 28px rgba(15, 23, 42, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .refresh-fab:hover i { animation-duration: 0.9s; }
    .back-fab:hover i { animation-duration: 0.8s; }

    .refresh-fab:active,
    .back-fab:active {
      transform: scale(0.96);
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(24px, -18px, 0) scale(1.08); }
    }

    @keyframes floatBall {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      25% { transform: translate3d(18px, -28px, 0) rotate(6deg) scale(1.02); }
      50% { transform: translate3d(-16px, 20px, 0) rotate(-7deg) scale(0.98); }
      75% { transform: translate3d(24px, -12px, 0) rotate(4deg) scale(1.01); }
    }

    @keyframes swayPin {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
      25% { transform: translate3d(14px, -22px, 0) rotate(3deg); }
      50% { transform: translate3d(-10px, 14px, 0) rotate(-4deg); }
      75% { transform: translate3d(16px, -10px, 0) rotate(2deg); }
    }

    @keyframes refreshSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes backPulse {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-4px); }
    }

    @media (max-width: 980px) {
      .site {
        width: min(var(--max-width), calc(100% - 12px));
      }

      .page {
        padding: 14px;
      }

      .records-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .site {
        width: 100%;
        padding: 0 0 22px;
      }

      .topbar {
        padding: 10px 8px 0;
        margin-bottom: 8px;
      }

      .page {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        padding: 12px 6px 16px;
      }

      h1 {
        font-size: clamp(1.8rem, 8vw, 2.8rem);
      }

      .records-grid {
        grid-template-columns: 1fr;
      }

      .refresh-fab,
      .back-fab {
        width: 48px;
        height: 48px;
        bottom: 14px;
      }

      .refresh-fab { right: 14px; }
      .back-fab { left: 14px; }

      .refresh-fab i,
      .back-fab i {
        font-size: 0.95rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .glow,
      .bg-shape,
      .refresh-fab i,
      .back-fab i {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="glow one"></div>
    <div class="glow two"></div>
    <div class="glow three"></div>

    <div class="bg-shape ball-bg" style="--size: 150px; --x: 7%; --y: 16%; --c1:#6ea8ff; --c2:#8b5cff; --dur:19s; --delay:-2s;"></div>
    <div class="bg-shape ball-bg" style="--size: 112px; --x: 84%; --y: 14%; --c1:#ff6aa8; --c2:#ff9b63; --dur:16s; --delay:-7s;"></div>
    <div class="bg-shape ball-bg" style="--size: 132px; --x: 78%; --y: 74%; --c1:#42d1ff; --c2:#6b7cff; --dur:22s; --delay:-5s;"></div>

    <div class="bg-shape pin-bg" style="--x: 18%; --y: 10%; --dur:18s; --delay:-4s;"></div>
    <div class="bg-shape pin-bg" style="--x: 92%; --y: 34%; --dur:15s; --delay:-8s; --w:50px; --h:150px;"></div>
  </div>

  <main class="site">
    <div class="topbar">
      <div class="brand">
        <span class="brand-mark"><i class="fa-solid fa-bowling-ball"></i></span>
        <span>Strikeclub Velten</span>
      </div>
    </div>

    <section class="page">
      <div class="header">
        <div class="eyebrow">
          <span class="dot"></span>
          <span>Rekorde</span>
        </div>

        <h1>Die besten Werte. <span class="headline-accent">Automatisch berechnet.</span></h1>

        <p class="hero-text">
          Diese Seite zieht ihre Rekorde direkt aus derselben Datentabelle wie die Spielerauswertung.
          Zukünftige Spieltage werden automatisch ignoriert.
        </p>
      </div>

      <div class="info-strip" id="recordInfo">
        Stand: wird berechnet …
      </div>

      <section class="records-grid" id="recordsGrid"></section>
    </section>

    <p class="footer-note">Strikeclub Velten</p>
  </main>

  <button
    class="back-fab"
    type="button"
    aria-label="Zurück zur Startseite"
    title="Zurück zur Startseite"
    onclick="location.href='index.html'"
  >
    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <button
    class="refresh-fab"
    type="button"
    aria-label="Seite aktualisieren"
    title="Seite aktualisieren"
    onclick="window.location.reload()"
  >
    <i class="fa-solid fa-rotate-right"></i>
  </button>

    function parseGermanDate(dateStr) {
      const match = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(String(dateStr || "").trim());
      if (!match) return null;
      const [, dd, mm, yyyy] = match;
      return new Date(Number(yyyy), Number(mm) - 1, Number(dd), 12, 0, 0, 0);
    }

    function isPastOrToday(dateStr) {
      const date = parseGermanDate(dateStr);
      if (!date) return false;

      const now = new Date();
      const todayEnd = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        23, 59, 59, 999
      );

      return date <= todayEnd;
    }

    function parseBool(value) {
      return String(value || "").trim().toLowerCase() === "true";
    }

    function parsePlayerTable(raw) {
      const lines = raw
        .replace(/\r/g, "")
        .split("\n")
        .map(line => line.trimEnd())
        .filter(line => line.trim() !== "");

      if (lines.length < 3) {
        throw new Error("Die Tabelle ist zu kurz oder leer.");
      }

      const spieltagLabels = lines[0].match(/Spieltag\s+\d+/g) || [];
      if (!spieltagLabels.length) {
        throw new Error("Keine Spieltag-Überschriften erkannt.");
      }

      const result = {};

      for (const line of lines.slice(2)) {
        const cells = line.split("\t").map(cell => cell.trim());
        const name = cells[0];
        if (!name) continue;

        const entries = [];

        for (let i = 0; i < spieltagLabels.length; i++) {
          const base = 1 + i * 4;

          const datum = cells[base] || "";
          const pinsRaw = cells[base + 1] || "0";
          const gamesRaw = cells[base + 2] || "0";
          const presentRaw = cells[base + 3] || "false";

          if (!datum) continue;
          if (!isPastOrToday(datum)) continue;

          const played = parseBool(presentRaw);
          const pins = Number(pinsRaw);
          const games = Number(gamesRaw);

          entries.push({
            spieltag: i + 1,
            datum,
            pins,
            games,
            played
          });
        }

        result[name] = entries;
      }

      return result;
    }

    function formatDecimal(value, digits = 1) {
      return new Intl.NumberFormat("de-DE", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      }).format(value);
    }

    function formatInteger(value) {
      return new Intl.NumberFormat("de-DE", {
        maximumFractionDigits: 0
      }).format(value);
    }

    function joinNames(names) {
      if (names.length === 1) return names[0];
      if (names.length === 2) return `${names[0]} und ${names[1]}`;
      return `${names.slice(0, -1).join(", ")} und ${names[names.length - 1]}`;
    }

    function findMaxWithTies(items, selector) {
      if (!items.length) return [];
      const maxValue = Math.max(...items.map(selector));
      return items.filter(item => selector(item) === maxValue);
    }

    function getConsistencyStats(entries) {
      const played = entries.filter(item => item.played && Number(item.games) > 0);

      if (played.length < 4) {
        return {
          score: null,
          stdDev: null,
          range: null
        };
      }

      const values = played.map(item => item.pins / item.games);
      const mean = values.reduce((sum, value) => sum + value, 0) / values.length;

      const variance = values.reduce((sum, value) => {
        const diff = value - mean;
        return sum + diff * diff;
      }, 0) / values.length;

      const stdDev = Math.sqrt(variance);
      const range = Math.max(...values) - Math.min(...values);
      const rawScore = 100 - stdDev * 2.5;
      const score = Math.max(0, Math.min(100, Math.round(rawScore)));

      return {
        score,
        stdDev,
        range
      };
    }

    function buildRecords(playerData) {
      const playedDays = [];
      const seasonStats = [];

      for (const [name, entries] of Object.entries(playerData)) {
        let totalPins = 0;
        let totalGames = 0;
        let totalDays = 0;

        for (const entry of entries) {
          if (entry.played && Number(entry.games) > 0) {
            const average = entry.pins / entry.games;

            playedDays.push({
              name,
              ...entry,
              average
            });

            totalPins += entry.pins;
            totalGames += entry.games;
            totalDays += 1;
          }
        }

        const currentAverage = totalGames > 0 ? totalPins / totalGames : null;
        const consistency = getConsistencyStats(entries);

        seasonStats.push({
          name,
          totalPins,
          totalGames,
          totalDays,
          average: currentAverage,
          consistencyScore: consistency.score,
          consistencyStdDev: consistency.stdDev,
          consistencyRange: consistency.range
        });
      }

      const topSeries = findMaxWithTies(playedDays, item => item.pins);
      const topDayAverage = findMaxWithTies(playedDays, item => item.average);
      const topSeasonAverage = findMaxWithTies(
        seasonStats.filter(item => item.totalGames > 0),
        item => item.average
      );
      const topTotalPins = findMaxWithTies(
        seasonStats.filter(item => item.totalPins > 0),
        item => item.totalPins
      );
      const topTotalGames = findMaxWithTies(
        seasonStats.filter(item => item.totalGames > 0),
        item => item.totalGames
      );
      const bestConsistency = findMaxWithTies(
        seasonStats.filter(item => item.consistencyScore != null),
        item => item.consistencyScore
      );

      return [
        {
          label: "Höchste Serie",
          value: topSeries.length ? `${formatInteger(topSeries[0].pins)} Pins` : "–",
          holder: topSeries.length === 1
            ? topSeries[0].name
            : `${topSeries.length} Spieler teilen sich den Rekord`,
          note: topSeries.length === 1
            ? `${topSeries[0].datum} · Spieltag ${topSeries[0].spieltag} · ${topSeries[0].games} Spiele`
            : joinNames(topSeries.map(item => item.name))
        },
        {
          label: "Bester Spieltag-Schnitt",
          value: topDayAverage.length ? formatDecimal(topDayAverage[0].average) : "–",
          holder: topDayAverage.length === 1
            ? topDayAverage[0].name
            : `${topDayAverage.length} Spieler teilen sich den Rekord`,
          note: topDayAverage.length === 1
            ? `${topDayAverage[0].datum} · Spieltag ${topDayAverage[0].spieltag}`
            : joinNames(topDayAverage.map(item => item.name))
        },
        {
          label: "Höchster Saisonschnitt",
          value: topSeasonAverage.length ? formatDecimal(topSeasonAverage[0].average) : "–",
          holder: topSeasonAverage.length === 1
            ? topSeasonAverage[0].name
            : `${topSeasonAverage.length} Spieler teilen sich den Rekord`,
          note: topSeasonAverage.length === 1
            ? `${formatInteger(topSeasonAverage[0].totalGames)} Spiele · ${formatInteger(topSeasonAverage[0].totalDays)} Spieltage`
            : joinNames(topSeasonAverage.map(item => item.name))
        },
        {
          label: "Meiste Pins gesamt",
          value: topTotalPins.length ? `${formatInteger(topTotalPins[0].totalPins)} Pins` : "–",
          holder: topTotalPins.length === 1
            ? topTotalPins[0].name
            : `${topTotalPins.length} Spieler teilen sich den Rekord`,
          note: topTotalPins.length === 1
            ? `${formatInteger(topTotalPins[0].totalGames)} Spiele · ${formatInteger(topTotalPins[0].totalDays)} Spieltage`
            : joinNames(topTotalPins.map(item => item.name))
        },
        {
          label: "Meiste Spiele",
          value: topTotalGames.length ? `${formatInteger(topTotalGames[0].totalGames)} Spiele` : "–",
          holder: topTotalGames.length === 1
            ? topTotalGames[0].name
            : `${topTotalGames.length} Spieler teilen sich den Rekord`,
          note: topTotalGames.length === 1
            ? `${formatInteger(topTotalGames[0].totalDays)} Spieltage`
            : joinNames(topTotalGames.map(item => item.name))
        },
        {
          label: "Beste Konstanz",
          value: bestConsistency.length ? `${formatInteger(bestConsistency[0].consistencyScore)} / 100` : "–",
          holder: bestConsistency.length === 1
            ? bestConsistency[0].name
            : `${bestConsistency.length} Spieler teilen sich den Rekord`,
          note: bestConsistency.length === 1
            ? `Schwankung ± ${formatDecimal(bestConsistency[0].consistencyStdDev)} · Spannweite ${formatDecimal(bestConsistency[0].consistencyRange)}`
            : joinNames(bestConsistency.map(item => item.name))
        }
      ];
    }

    function renderRecords(records) {
      const grid = document.getElementById("recordsGrid");
      grid.innerHTML = "";

      records.forEach(record => {
        const card = document.createElement("article");
        card.className = "record-card";

        card.innerHTML = `
          <span class="record-label">${record.label}</span>
          <div class="record-value">${record.value}</div>
          <div class="record-holder">${record.holder}</div>
          <div class="record-note">${record.note}</div>
        `;

        grid.appendChild(card);
      });
    }

    function countPlayedDays(playerData) {
      return Object.values(playerData).reduce((sum, entries) => {
        return sum + entries.filter(entry => entry.played && Number(entry.games) > 0).length;
      }, 0);
    }

    function getLatestRecordedDate(playerData) {
      const dates = [];

      Object.values(playerData).forEach(entries => {
        entries.forEach(entry => {
          if (entry.played && Number(entry.games) > 0) {
            dates.push(entry.datum);
          }
        });
      });

      if (!dates.length) return "–";

      dates.sort((a, b) => parseGermanDate(a) - parseGermanDate(b));
      return dates[dates.length - 1];
    }

    try {
      const playerData = parsePlayerTable(RAW_PLAYER_TABLE);
      const records = buildRecords(playerData);

      renderRecords(records);

      const playerCount = Object.keys(playerData).length;
      const playedDaysCount = countPlayedDays(playerData);
      const latestDate = getLatestRecordedDate(playerData);

      document.getElementById("recordInfo").textContent =
        `Stand: ${latestDate} · ${playerCount} Spieler erfasst · ${playedDaysCount} gespielte Einträge ausgewertet`;
    } catch (error) {
      document.getElementById("recordInfo").textContent =
        `Fehler beim Einlesen der Tabelle: ${error.message}`;

      document.getElementById("recordsGrid").innerHTML = `
        <article class="record-card">
          <span class="record-label">Hinweis</span>
          <div class="record-value">Tabelle prüfen</div>
          <div class="record-holder">Die Rekorde konnten nicht berechnet werden.</div>
          <div class="record-note">${error.message}</div>
        </article>
      `;
    }
  </script>
