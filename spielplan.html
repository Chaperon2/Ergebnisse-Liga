<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spielplan - Hausliga Velten</title>

  <meta property="og:title" content="Spielplan - Hausliga Velten" />
  <meta property="og:description" content="Der aktuelle Spielplan der Hausliga Velten." />
  <meta property="og:url" content="https://www.strikeclub-velten.de/spielplan.html" />
  <meta property="og:image" content="https://raw.githubusercontent.com/Chaperon2/Ergebnisse-Liga/refs/heads/main/images/Spielplan.jpg" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --text: #0f172a;
      --text-soft: #5f718d;
      --border: rgba(119, 145, 185, 0.14);
      --shadow-xl: 0 30px 80px rgba(35, 58, 100, 0.14);
      --shadow-lg: 0 18px 46px rgba(35, 58, 100, 0.10);
      --shadow-md: 0 10px 28px rgba(35, 58, 100, 0.08);
      --max-width: 1440px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(91, 124, 255, 0.12), transparent 30%),
        radial-gradient(circle at 92% 10%, rgba(255, 92, 159, 0.12), transparent 24%),
        radial-gradient(circle at 82% 84%, rgba(51, 198, 255, 0.14), transparent 30%),
        linear-gradient(180deg, #fbfdff 0%, #f3f8ff 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(76px);
      opacity: 0.44;
      animation: drift 18s ease-in-out infinite;
    }

    .glow.one {
      width: 340px;
      height: 340px;
      left: -80px;
      top: 40px;
      background: rgba(91, 124, 255, 0.16);
    }

    .glow.two {
      width: 290px;
      height: 290px;
      right: -30px;
      top: 140px;
      background: rgba(255, 92, 159, 0.14);
      animation-delay: -6s;
    }

    .glow.three {
      width: 380px;
      height: 380px;
      right: 14%;
      bottom: -100px;
      background: rgba(51, 198, 255, 0.16);
      animation-delay: -11s;
    }

    .bg-shape {
      position: absolute;
      opacity: 0.22;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }

    .ball-bg {
      width: var(--size, 120px);
      height: var(--size, 120px);
      left: var(--x, 10%);
      top: var(--y, 10%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 35%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        radial-gradient(circle at 55% 28%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        radial-gradient(circle at 60% 48%, rgba(16,24,40,0.14) 0 6px, transparent 7px),
        linear-gradient(145deg, var(--c1, #7c9bff), var(--c2, #b15cff));
      box-shadow:
        inset -18px -18px 30px rgba(255,255,255,0.24),
        inset 18px 18px 28px rgba(255,255,255,0.14),
        0 16px 32px rgba(65, 85, 130, 0.10);
      animation-name: floatBall;
      animation-duration: var(--dur, 18s);
      animation-delay: var(--delay, 0s);
    }

    .pin-bg {
      width: var(--w, 56px);
      height: var(--h, 164px);
      left: var(--x, 15%);
      top: var(--y, 20%);
      border-radius: 40% 40% 42% 42% / 15% 15% 72% 72%;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 40%, #eef4ff 100%);
      box-shadow:
        inset 0 0 0 1px rgba(150, 170, 205, 0.14),
        0 16px 32px rgba(65, 85, 130, 0.08);
      animation-name: swayPin;
      animation-duration: var(--dur, 16s);
      animation-delay: var(--delay, 0s);
      transform-origin: center 82%;
    }

    .pin-bg::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 8px;
      right: 8px;
      height: 18px;
      border-radius: 999px;
      background:
        linear-gradient(
          180deg,
          rgba(255, 92, 159, 0.84) 0%,
          rgba(255, 92, 159, 0.84) 42%,
          transparent 42%,
          transparent 58%,
          rgba(255, 104, 142, 0.74) 58%,
          rgba(255, 104, 142, 0.74) 100%
        );
    }

    .site {
      position: relative;
      z-index: 2;
      width: min(var(--max-width), calc(100% - 22px));
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(122, 146, 182, 0.14);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(35, 58, 100, 0.06);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(91,124,255,1), rgba(255,92,159,1));
      color: #fff;
      box-shadow: 0 8px 20px rgba(91, 124, 255, 0.24);
    }

    .page {
      position: relative;
      padding: 20px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(255,255,255,0.80));
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 10%, rgba(91, 124, 255, 0.10), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(255, 92, 159, 0.08), transparent 22%),
        radial-gradient(circle at 72% 100%, rgba(51, 198, 255, 0.10), transparent 28%);
      pointer-events: none;
    }

    .header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .header-side {
      display: grid;
      gap: 10px;
      justify-items: end;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(122, 146, 182, 0.12);
      font-weight: 700;
      font-size: 0.9rem;
      color: #36507a;
      margin-bottom: 14px;
      box-shadow: 0 10px 24px rgba(35, 58, 100, 0.04);
    }

    .eyebrow .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3bc7ff, #7a5cff);
      box-shadow: 0 0 0 6px rgba(91, 124, 255, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .headline-accent {
      background: linear-gradient(135deg, #0f172a 0%, #4964ff 44%, #ff5c9f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .intro {
      max-width: 72ch;
      color: var(--text-soft);
      line-height: 1.55;
      font-size: 0.96rem;
      margin: 12px 0 0;
    }

    .info-pill {
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(122,146,182,0.14);
      box-shadow: 0 12px 28px rgba(35, 58, 100, 0.06);
      min-width: 220px;
    }

    .info-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: #6a7b97;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .jump-btn {
      border: 0;
      cursor: pointer;
      font: inherit;
      padding: 12px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #16203d, #4964ff);
      color: #ffffff;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(35, 58, 100, 0.16);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .jump-btn:hover {
      filter: brightness(1.04);
    }

    .schedule-panel {
      position: relative;
      z-index: 1;
      border-radius: 24px;
      background: rgba(255,255,255,0.60);
      border: 1px solid rgba(122,146,182,0.12);
      box-shadow: var(--shadow-lg);
      padding: 12px;
    }

    .warning-pill {
      display: none;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 184, 77, 0.18);
      border: 1px solid rgba(255, 184, 77, 0.28);
      color: #8a5a00;
      font-size: 0.86rem;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(35, 58, 100, 0.04);
    }

    .warning-pill.show {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .phase-grid {
      display: grid;
      gap: 16px;
    }

    .phase-card {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(122,146,182,0.12);
      box-shadow: 0 16px 36px rgba(35, 58, 100, 0.06);
    }

    .phase-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 8% 15%, var(--accent-a), transparent 24%),
        radial-gradient(circle at 90% 20%, var(--accent-b), transparent 22%),
        radial-gradient(circle at 78% 88%, var(--accent-c), transparent 26%);
      opacity: 0.78;
    }

    .theme-hinrunde {
      --accent-a: rgba(91,124,255,0.22);
      --accent-b: rgba(255,92,159,0.16);
      --accent-c: rgba(51,198,255,0.16);
    }

    .theme-rueckrunde {
      --accent-a: rgba(55,201,151,0.22);
      --accent-b: rgba(255,184,77,0.16);
      --accent-c: rgba(138,92,255,0.16);
    }

    .phase-head {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(122,146,182,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(248,251,255,0.64));
      backdrop-filter: blur(8px);
    }

    .phase-title-wrap {
      display: grid;
      gap: 4px;
    }

    .phase-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .phase-subtitle {
      color: var(--text-soft);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .phase-count {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(122,146,182,0.12);
      color: #596f93;
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(35, 58, 100, 0.04);
    }

    .matchday-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .matchday-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(122,146,182,0.10);
      box-shadow: 0 12px 28px rgba(35, 58, 100, 0.05);
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }

    .matchday-card.pulse-target {
      box-shadow:
        0 0 0 2px rgba(73,100,255,0.34),
        0 18px 40px rgba(35, 58, 100, 0.12);
      transform: translateY(-2px);
    }

    .matchday-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(91,124,255,0.08), transparent 34%),
        linear-gradient(315deg, rgba(255,92,159,0.06), transparent 34%);
    }

    .matchday-date-bar {
      position: relative;
      z-index: 1;
      padding: 13px 14px 11px;
      background: linear-gradient(135deg, rgba(91,124,255,0.96), rgba(255,92,159,0.90));
      color: #fff;
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: -0.02em;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.18);
    }

    .matchday-content {
      position: relative;
      z-index: 1;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .lane-block {
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(246,250,255,0.92));
      border: 1px solid rgba(122,146,182,0.08);
      box-shadow: 0 6px 16px rgba(35, 58, 100, 0.04);
    }

    .lane-title {
      padding: 10px 12px 8px;
      background: linear-gradient(135deg, rgba(51,198,255,0.22), rgba(138,92,255,0.18));
      color: #244f87;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(122,146,182,0.08);
    }

    .vs-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .team-box {
      min-width: 0;
      padding: 10px 12px;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--team-bg-1, rgba(255,255,255,0.94)), var(--team-bg-2, rgba(245,248,255,0.92)));
      border: 1px solid var(--team-border, rgba(122,146,182,0.14));
      color: var(--team-text, #1f3b63);
      font-weight: 900;
      line-height: 1.2;
      box-shadow: 0 8px 18px rgba(35, 58, 100, 0.07);
      text-align: center;
      overflow-wrap: anywhere;
    }

    .team-box.home,
    .team-box.away {
      color: var(--team-text, #1f3b63);
    }

    .vs {
      width: 42px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(22, 32, 61, 0.92), rgba(73, 100, 255, 0.88));
      color: #ffffff;
      font-size: 0.84rem;
      font-weight: 900;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.18),
        0 8px 18px rgba(35, 58, 100, 0.16);
    }

    .divider {
      height: 8px;
      margin: 0 10px 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(91,124,255,0.88), rgba(255,92,159,0.82), rgba(51,198,255,0.84));
      box-shadow: 0 8px 20px rgba(91,124,255,0.12);
    }

    .lane-block:last-child .divider {
      display: none;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .action-btn {
      border: 0;
      cursor: pointer;
      font: inherit;
      padding: 14px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #5b7cff, #ff5c9f);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(91, 124, 255, 0.20);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.80);
      color: #5e7395;
      border: 1px solid rgba(122,146,182,0.14);
      box-shadow: 0 10px 24px rgba(35, 58, 100, 0.05);
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: #6c7b96;
      font-size: 0.92rem;
      padding: 0 8px;
    }

    .footer-note a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(108, 123, 150, 0.34);
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .footer-note a:hover {
      opacity: 1;
      border-bottom-color: rgba(108, 123, 150, 0.75);
    }

    .refresh-fab,
    .back-fab {
      position: fixed;
      bottom: 18px;
      z-index: 9999;
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(135deg, rgba(91, 124, 255, 0.92), rgba(255, 92, 159, 0.92));
      box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(10px);
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .refresh-fab {
      right: 18px;
    }

    .back-fab {
      left: 18px;
    }

    .refresh-fab i {
      font-size: 1rem;
      animation: refreshSpin 2.4s linear infinite;
    }

    .back-fab i {
      font-size: 1rem;
      animation: backPulse 1.6s ease-in-out infinite;
    }

    .refresh-fab:hover,
    .back-fab:hover {
      transform: translateY(-2px) scale(1.05);
      filter: saturate(1.08);
      box-shadow:
        0 14px 28px rgba(15, 23, 42, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .refresh-fab:hover i {
      animation-duration: 0.9s;
    }

    .back-fab:hover i {
      animation-duration: 0.8s;
    }

    .refresh-fab:active,
    .back-fab:active {
      transform: scale(0.96);
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(24px, -18px, 0) scale(1.08); }
    }

    @keyframes floatBall {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      25% { transform: translate3d(18px, -28px, 0) rotate(6deg) scale(1.02); }
      50% { transform: translate3d(-16px, 20px, 0) rotate(-7deg) scale(0.98); }
      75% { transform: translate3d(24px, -12px, 0) rotate(4deg) scale(1.01); }
    }

    @keyframes swayPin {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
      25% { transform: translate3d(14px, -22px, 0) rotate(3deg); }
      50% { transform: translate3d(-10px, 14px, 0) rotate(-4deg); }
      75% { transform: translate3d(16px, -10px, 0) rotate(2deg); }
    }

    @keyframes refreshSpin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes backPulse {
      0%, 100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(-4px);
      }
    }

    @media (max-width: 980px) {
      .topbar,
      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .site {
        width: min(var(--max-width), calc(100% - 12px));
      }

      .page {
        padding: 14px;
      }

      .matchday-grid {
        grid-template-columns: 1fr;
      }

      .header-side {
        justify-items: stretch;
      }
    }

    @media (max-width: 700px) {
      .site {
        width: 100%;
        padding: 0 0 22px;
      }

      .topbar {
        padding: 10px 8px 0;
        margin-bottom: 8px;
      }

      .page {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        padding: 10px 4px 14px;
      }

      h1 {
        font-size: clamp(1.8rem, 8vw, 2.8rem);
      }

      .intro {
        font-size: 0.9rem;
      }

      .schedule-panel {
        padding: 8px 4px;
        border-radius: 16px;
      }

      .phase-card {
        border-radius: 16px;
      }

      .phase-head,
      .matchday-date-bar {
        padding-left: 10px;
        padding-right: 10px;
      }

      .matchday-grid {
        gap: 10px;
        padding: 10px;
      }

      .jump-btn {
        width: 100%;
        justify-content: center;
      }

      .vs-row {
        grid-template-columns: 1fr auto 1fr;
        gap: 8px;
        align-items: center;
      }

      .vs {
        justify-self: center;
      }

      .team-box {
        padding: 9px 8px;
        font-size: 0.9rem;
      }

      .actions {
        flex-direction: column;
      }

      .action-btn,
      .secondary-btn {
        width: 100%;
        justify-content: center;
      }

      .refresh-fab,
      .back-fab {
        width: 48px;
        height: 48px;
        bottom: 14px;
      }

      .refresh-fab {
        right: 14px;
      }

      .back-fab {
        left: 14px;
      }

      .refresh-fab i,
      .back-fab i {
        font-size: 0.95rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .glow,
      .bg-shape,
      .refresh-fab i,
      .back-fab i {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="glow one"></div>
    <div class="glow two"></div>
    <div class="glow three"></div>

    <div class="bg-shape ball-bg" style="--size: 150px; --x: 7%; --y: 16%; --c1:#6ea8ff; --c2:#8b5cff; --dur:19s; --delay:-2s;"></div>
    <div class="bg-shape ball-bg" style="--size: 112px; --x: 84%; --y: 14%; --c1:#ff6aa8; --c2:#ff9b63; --dur:16s; --delay:-7s;"></div>
    <div class="bg-shape ball-bg" style="--size: 132px; --x: 78%; --y: 74%; --c1:#42d1ff; --c2:#6b7cff; --dur:22s; --delay:-5s;"></div>

    <div class="bg-shape pin-bg" style="--x: 18%; --y: 10%; --dur:18s; --delay:-4s;"></div>
    <div class="bg-shape pin-bg" style="--x: 92%; --y: 34%; --dur:15s; --delay:-8s; --w:50px; --h:150px;"></div>
  </div>

  <main class="site">
    <div class="topbar">
      <div class="brand">
        <span class="brand-mark"><i class="fa-solid fa-bowling-ball"></i></span>
        <span>Strikeclub Velten</span>
      </div>
    </div>

    <section class="page">
      <div class="header">
        <div>
          <div class="eyebrow">
            <span class="dot"></span>
            <span>Spielplan</span>
          </div>

          <h1>Hausliga Velten. <span class="headline-accent">Alle Spieltage im Überblick.</span></h1>

          
        </div>

        <div class="header-side">
          <div class="info-pill">
            <span class="info-label">Ansicht</span>
            <div class="info-value">Spielplan 2026</div>
          </div>

          <button class="jump-btn" id="jumpToCurrentBtn" type="button">
            <i class="fa-solid fa-location-arrow"></i>
            <span>Zum relevanten Datum</span>
          </button>
        </div>
      </div>

      <div class="schedule-panel">
        <div class="warning-pill" id="warningPill">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="warningText"></span>
        </div>

        <div class="phase-grid" id="phaseGrid"></div>

        <div class="actions">
          <button class="action-btn secondary-btn" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
            <i class="fa-solid fa-arrow-up"></i>

          </button>
        </div>
      </div>
    </section>

    <p class="footer-note">
      Strikeclub Velten · <a href="impressum.html">Impressum</a>
    </p>
  </main>

  <button
    class="back-fab"
    type="button"
    aria-label="Zurück zur Startseite"
    title="Zurück zur Startseite"
    onclick="location.href='index.html'"

    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <button
    class="refresh-fab"
    type="button"
    aria-label="Seite aktualisieren"
    title="Seite aktualisieren"
    onclick="window.location.reload()"
  >
    <i class="fa-solid fa-rotate-right"></i>
  </button>

  <script>
    const PAGE_DATA = {
      raw: `Hinrunde

Datum	Ansetzung		Bahn
15.07.2026	Scooter	Tigers	1+2

Datum	Ansetzung		Bahn
22.07.2026	Pincesses	3 Bowler	1+2
	Scooter	Lady Diana´s	3+4
	Tigers	Die Schräägen	5+6
	All Stars	Malibu	7+8`
    };

    const phaseGrid = document.getElementById("phaseGrid");
    const warningPill = document.getElementById("warningPill");
    const warningText = document.getElementById("warningText");
    const jumpToCurrentBtn = document.getElementById("jumpToCurrentBtn");

    function normalizeLine(line) {
      return line.replace(/\u00A0/g, " ").trimEnd();
    }

    function splitColumns(line) {
      if (line.includes("\t")) {
        return line.split("\t").map(cell => cell.trim());
      }
      return line.trim().split(/\s{2,}/).map(cell => cell.trim());
    }

    function isPhaseTitle(line) {
      return /^(Hinrunde|Rückrunde)$/i.test(line.trim());
    }

    function isHeaderLine(cells) {
      return (cells[0] || "").toLowerCase() === "datum";
    }

    function isDate(value) {
      return /^\d{2}\.\d{2}\.\d{4}$/.test((value || "").trim());
    }

    function parseSchedule(raw) {
      const lines = raw
        .replace(/\r/g, "")
        .split("\n")
        .map(normalizeLine);

      const phases = [];
      let currentPhase = null;
      let currentMatchday = null;
      const warnings = [];

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();

        if (line.trim() === "") continue;

        if (isPhaseTitle(line)) {
          currentPhase = { title: line.trim(), matchdays: [] };
          phases.push(currentPhase);
          currentMatchday = null;
          continue;
        }

        const cells = splitColumns(line);
        if (!cells.length) continue;
        if (isHeaderLine(cells)) continue;

        if (!currentPhase) {
          currentPhase = { title: "Spielplan", matchdays: [] };
          phases.push(currentPhase);
        }

        let date = cells[0] || "";
        let teamA = cells[1] || "";
        let teamB = cells[2] || "";
        let lane = cells[3] || "";

        if (cells.length === 3 && currentMatchday) {
          date = "";
          teamA = cells[0] || "";
          teamB = cells[1] || "";
          lane = cells[2] || "";
        }

        if (isDate(date)) {
          currentMatchday = { date, matches: [] };
          currentPhase.matchdays.push(currentMatchday);
        } else if (!currentMatchday) {
          warnings.push("Einige Spielplan-Zeilen konnten keinem Datum zugeordnet werden.");
          continue;
        }

        if (!teamA || !teamB || !lane) {
          warnings.push(`Unvollständige Ansetzung in ${currentPhase.title} erkannt.`);
          continue;
        }

        currentMatchday.matches.push({ teamA, teamB, lane });
      }

      return { phases, warnings };
    }

    function normalizeTeamName(name) {
      return String(name || "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    const TEAM_COLORS = {
      "die 3 blinden": {
        bg1: "rgba(91,124,255,0.34)",
        bg2: "rgba(91,124,255,0.16)",
        border: "rgba(91,124,255,0.34)",
        text: "#123f8a"
      },
      "die abräumer": {
        bg1: "rgba(255,92,159,0.34)",
        bg2: "rgba(255,92,159,0.16)",
        border: "rgba(255,92,159,0.34)",
        text: "#8f2457"
      },
      "gummibande": {
        bg1: "rgba(255,184,77,0.34)",
        bg2: "rgba(255,184,77,0.16)",
        border: "rgba(255,184,77,0.34)",
        text: "#8a5600"
      },
      "pin fighter": {
        bg1: "rgba(138,92,255,0.34)",
        bg2: "rgba(138,92,255,0.16)",
        border: "rgba(138,92,255,0.34)",
        text: "#5a2f9b"
      },
      "pin bomber": {
        bg1: "rgba(55,201,151,0.34)",
        bg2: "rgba(55,201,151,0.16)",
        border: "rgba(55,201,151,0.34)",
        text: "#0d6b4c"
      },
      "pitchers": {
        bg1: "rgba(51,198,255,0.34)",
        bg2: "rgba(51,198,255,0.16)",
        border: "rgba(51,198,255,0.34)",
        text: "#0d678c"
      },
      "stranger pins": {
        bg1: "rgba(255,127,80,0.34)",
        bg2: "rgba(255,127,80,0.16)",
        border: "rgba(255,127,80,0.34)",
        text: "#93411f"
      },
      "donnerbälle": {
        bg1: "rgba(122,181,255,0.34)",
        bg2: "rgba(122,181,255,0.16)",
        border: "rgba(122,181,255,0.34)",
        text: "#1b4f96"
      }
    };

    function applyTeamColors(element, teamName) {
      const key = normalizeTeamName(teamName);
      const color = TEAM_COLORS[key];

      if (!color) return;

      element.style.setProperty("--team-bg-1", color.bg1);
      element.style.setProperty("--team-bg-2", color.bg2);
      element.style.setProperty("--team-border", color.border);
      element.style.setProperty("--team-text", color.text);
    }

    function createLaneBlock(match, isLast) {
      const block = document.createElement("div");
      block.className = "lane-block";

      const homeClass = normalizeTeamName(match.teamA).replace(/\s+/g, "-");
      const awayClass = normalizeTeamName(match.teamB).replace(/\s+/g, "-");

      block.innerHTML = `
        <div class="lane-title">Bahn ${match.lane}</div>
        <div class="vs-row">
          <div class="team-box home team-${homeClass}">${match.teamA}</div>
          <div class="vs">VS</div>
          <div class="team-box away team-${awayClass}">${match.teamB}</div>
        </div>
        ${isLast ? "" : '<div class="divider"></div>'}
      `;

      const homeBox = block.querySelector(".team-box.home");
      const awayBox = block.querySelector(".team-box.away");

      applyTeamColors(homeBox, match.teamA);
      applyTeamColors(awayBox, match.teamB);

      return block;
    }

    function createMatchdayCard(matchday) {
      const card = document.createElement("article");
      card.className = "matchday-card";
      card.dataset.date = matchday.date;
      card.id = `matchday-${matchday.date.replace(/\./g, "-")}`;

      const dateBar = document.createElement("div");
      dateBar.className = "matchday-date-bar";
      dateBar.textContent = matchday.date;

      const content = document.createElement("div");
      content.className = "matchday-content";

      matchday.matches.forEach((match, index) => {
        content.appendChild(createLaneBlock(match, index === matchday.matches.length - 1));
      });

      card.appendChild(dateBar);
      card.appendChild(content);

      return card;
    }

    function createPhaseCard(phase, themeClass) {
      const card = document.createElement("section");
      card.className = `phase-card ${themeClass}`;

      const head = document.createElement("div");
      head.className = "phase-head";
      head.innerHTML = `
        <div class="phase-title-wrap">
          <h2 class="phase-title">${phase.title}</h2>
          <div class="phase-subtitle">${phase.matchdays.length} Spieltage</div>
        </div>
        <div class="phase-count">${phase.matchdays.reduce((sum, d) => sum + d.matches.length, 0)} Paarungen</div>
      `;

      const grid = document.createElement("div");
      grid.className = "matchday-grid";

      phase.matchdays.forEach(matchday => {
        grid.appendChild(createMatchdayCard(matchday));
      });

      card.appendChild(head);
      card.appendChild(grid);

      return card;
    }

    function renderPage() {
      const parsed = parseSchedule(PAGE_DATA.raw);
      phaseGrid.innerHTML = "";

      const themes = ["theme-hinrunde", "theme-rueckrunde"];

      parsed.phases.forEach((phase, index) => {
        phaseGrid.appendChild(createPhaseCard(phase, themes[index % themes.length]));
      });

      if (parsed.warnings.length) {
        warningText.textContent = parsed.warnings[0];
        warningPill.classList.add("show");
      } else {
        warningPill.classList.remove("show");
      }

      updateJumpButtonLabel();
      jumpToCurrentBtn.onclick = scrollToRelevantMatchday;
    }

    function dateStringToKey(dateStr) {
      const [day, month, year] = String(dateStr).split(".");
      return `${year}-${month}-${day}`;
    }

    function getBerlinNow() {
      const formatter = new Intl.DateTimeFormat("de-DE", {
        timeZone: "Europe/Berlin",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });

      const parts = Object.fromEntries(
        formatter
          .formatToParts(new Date())
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      return {
        key: `${parts.year}-${parts.month}-${parts.day}`,
        hour: Number(parts.hour),
        minute: Number(parts.minute)
      };
    }

    function getRelevantMatchdayCard() {
      const cards = Array.from(document.querySelectorAll(".matchday-card[data-date]"));
      if (!cards.length) return null;

      const schedule = cards.map(card => ({
        card,
        date: card.dataset.date,
        key: dateStringToKey(card.dataset.date)
      }));

      const now = getBerlinNow();
      const currentMinutes = now.hour * 60 + now.minute;
      const cutoffMinutes = 18 * 60 + 45;

      const sameDay = schedule.find(item => item.key === now.key);

      if (sameDay && currentMinutes <= cutoffMinutes) {
        return sameDay.card;
      }

      const nextFuture = schedule.find(item => item.key > now.key);
      if (nextFuture) {
        return nextFuture.card;
      }

      if (sameDay) {
        return sameDay.card;
      }

      return schedule[schedule.length - 1].card;
    }

    function updateJumpButtonLabel() {
      const target = getRelevantMatchdayCard();
      if (!target) return;

      const label = target.dataset.date;
      const span = jumpToCurrentBtn.querySelector("span");
      if (span) {
        span.textContent = `Zum ${label}`;
      }
    }

    function scrollToRelevantMatchday() {
      const target = getRelevantMatchdayCard();
      if (!target) return;

      target.scrollIntoView({tigers
        behavior: "smooth",
        block: "start"
      });

      target.classList.add("pulse-target");
      window.setTimeout(() => {
        target.classList.remove("pulse-target");
      }, 1800);
    }

    renderPage();
  </script>
