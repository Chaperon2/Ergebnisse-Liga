<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In Arbeit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Inter", Arial, sans-serif;
      background: #090d14;
    }

    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #090d14;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.04);
    }

    .video-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(8, 12, 20, 0.40), rgba(8, 12, 20, 0.60)),
        radial-gradient(circle at 10% 10%, rgba(91, 124, 255, 0.14), transparent 30%),
        radial-gradient(circle at 92% 10%, rgba(255, 92, 159, 0.14), transparent 24%),
        radial-gradient(circle at 82% 84%, rgba(51, 198, 255, 0.16), transparent 30%);
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .text {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      color: var(--text);
      text-shadow:
        0 8px 28px rgba(0,0,0,0.34),
        0 2px 8px rgba(0,0,0,0.28);
      animation: pulseText 2.2s ease-in-out infinite;
    }

    .dots::after {
      content: "";
      display: inline-block;
      width: 1.2em;
      text-align: left;
      animation: dots 1.6s steps(4, end) infinite;
    }

    @keyframes pulseText {
      0%, 100% {
        transform: scale(1);
        opacity: 0.88;
      }
      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    @keyframes dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
      100% { content: ""; }
    }

    @media (prefers-reduced-motion: reduce) {
      .text,
      .dots::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="video-bg" aria-hidden="true">
    <video src="Rauch4.mp4" autoplay muted loop playsinline preload="auto"></video>
  </div>

  <main class="content">
    <div class="text">
      In Arbeit<span class="dots"></span>
    </div>
  </main>
</body>
</html>
